name: Uppdatera hotnivå

# Hämtar öppna hotsignaler, kör MiniMax-analys och committar data.json.
on:
  schedule:
    # Var 30:e minut, men på minut 7/37 i stället för 0/30: GitHub skjuter ofta
    # upp eller hoppar över cron-jobb på jämna klockslag p.g.a. hög last.
    - cron: "7,37 * * * *"
  workflow_dispatch: {} # tillåt manuell körning

# Undvik överlappande körningar
concurrency:
  group: update-threat-level
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checka ut repot
        uses: actions/checkout@v4

      - name: Sätt upp Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Kör hotanalys
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_MODEL: ${{ secrets.MINIMAX_MODEL }}
          MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL }}
          MINIMAX_GROUP_ID: ${{ secrets.MINIMAX_GROUP_ID }}
          # E-postnotiser (valfritt). Utan BUTTONDOWN_API_KEY skickas inga mejl.
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node scripts/analyze.mjs

      - name: Committa uppdaterad lägesbild
        run: |
          git config user.name "stormvarning-bot"
          git config user.email "actions@github.com"
          git add data.json history.json
          if git diff --cached --quiet; then
            echo "Inga ändringar – hoppar över commit."
          else
            git commit -m "Uppdatera hotnivå ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
