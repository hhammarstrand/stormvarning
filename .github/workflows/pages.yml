name: Deploya till GitHub Pages

# Publicerar de statiska filerna (inkl. senaste data.json) till GitHub Pages.
on:
  push:
    branches: [main]
  # Deploya om efter varje hotanalys så att den nya data.json publiceras.
  # workflow_run triggas även av commits gjorda med GITHUB_TOKEN – till skillnad
  # från "push" – vilket krävs eftersom cron-jobbet committar med den token.
  workflow_run:
    workflows: ["Uppdatera hotnivå"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Tillåt en pågående deploy i taget; avbryt inte pågående (låt den bli klar).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # Vid workflow_run: deploya bara om hotanalysen lyckades. Övriga triggers
    # (push/manuell) deployar alltid.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checka ut repot
        uses: actions/checkout@v4

      - name: Konfigurera Pages
        uses: actions/configure-pages@v5

      - name: Ladda upp artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: "." # hela repo-roten är den statiska sajten

      - name: Deploya
        id: deployment
        uses: actions/deploy-pages@v4
